<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendzForce · Reset Password</title>
  <link rel="icon" type="image/png" href="logo_png.png">
  <meta name="description" content="TrendzForce: Rhapsody of Realities Social Trending Platform">
  <meta property="og:title" content="TrendzForce">
  <meta property="og:description" content="TrendzForce: Rhapsody of Realities Social Trending Platform">
  <meta property="og:image" content="logo_png.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f172a;
      --paper: #f8fafc;
      --gold: #7c3aed;
      --gold-pale: #f5f3ff;
      --muted: #64748b;
      --border: #e2e8f0;
      --error: #ef4444;
      --success: #10b981;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      background: var(--paper);
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    .topbar {
      background: var(--ink);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand { display:flex; align-items:center; gap:8px; font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .topbar-brand span { color: var(--gold); }
    .topbar-back { font-size: 13px; color: rgba(255, 255, 255, .5); text-decoration: none; cursor: pointer; transition: color .2s; }
    .topbar-back:hover { color: #fff; }

    .page { max-width: 500px; margin: 0 auto; padding: 48px 24px; }
    .page-header { margin-bottom: 32px; text-align:center; }
    .page-title { font-family: 'Outfit', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -1px; color: var(--ink); line-height: 1.1; margin-bottom:8px;}
    .page-sub { font-size: 14px; color: var(--muted); line-height: 1.5; }

    .section { background: #fff; border: 1.5px solid var(--border); border-radius: 16px; padding: 28px 32px; margin-bottom: 20px; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--ink); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
    input[type=text], input[type=password], select {
      width: 100%; padding: 11px 13px; background: #f9f8f6; border: 1.5px solid var(--border); border-radius: 9px;
      font-family: 'Inter', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: all .2s;
    }
    input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(155, 81, 224, .1); background: #fff; }

    .btn-primary {
      width: 100%; padding: 15px; background: var(--ink); color: #fff; border: none; border-radius: 12px;
      font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 8px;
    }
    .btn-primary:hover { background: #222; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 0, 0, .15); }

    .error-banner { background: #fff1ee; border: 1px solid #f5c8be; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--error); margin-bottom: 20px; display: none; }
    .success-banner { background: #eef5f0; border: 1px solid #b8d9c4; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--success); margin-bottom: 20px; display: none; }
    .req { color: var(--error); margin-left: 2px; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-brand">
      <img src="logo_png.png" alt="Logo" style="height:24px; border-radius:4px;">
      <div>Trendz<span>Force</span></div>
    </div>
    <a class="topbar-back" onclick="window.location.href='index.html'">← Back to sign in</a>
  </div>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Reset Password</div>
      <div class="page-sub">Verify your identity to create a new password.</div>
    </div>

    <div class="error-banner" id="errBanner"></div>
    <div class="success-banner" id="okBanner"></div>

    <div class="section">
      <div class="form-group">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" id="reset_name" placeholder="Name exactly as registered">
      </div>
      <div class="form-group">
        <label>KingsChat Handle <span class="req">*</span></label>
        <input type="text" id="reset_handle" placeholder="@yourhandle">
      </div>
      <div class="form-group">
        <label>Trending Group <span class="req">*</span></label>
        <select id="reset_group">
          <option value="">Select your group...</option>
          <option>ROR APP TRENDFORCE A</option>
          <option>ROR PROGRAMS TRENDFORCE C</option>
          <option>ROR DSD TRENDFORCE D</option>
          <option>ROR DSD TRENDFORCE E</option>
          <option>ROR PROGRAMS TRENDFORCE F</option>
          <option>ROR PROGRAMS TRENDFORCE G</option>
          <option>ROR APP TRENDFORCE H</option>
          <option>ROR PROGRAMS TRENDFORCE I</option>
          <option>ROR APP TRENDFORCE J</option>
          <option>ROR PROGRAMS TRENDFORCE K</option>
        </select>
      </div>
      <div style="height:1px; background:var(--border); margin:24px 0;"></div>
      <div class="form-group">
        <label>New Password <span class="req">*</span></label>
        <input type="password" id="reset_pass" placeholder="Create a new password">
      </div>
      <div class="form-group">
        <label>Confirm Password <span class="req">*</span></label>
        <input type="password" id="reset_pass2" placeholder="Repeat new password">
      </div>
      <button class="btn-primary" onclick="submitReset()">Reset Password</button>
    </div>
  </div>

  <script>
    function submitReset() {
      const name = document.getElementById('reset_name').value.trim();
      const handle = document.getElementById('reset_handle').value.trim().replace(/^@/, '');
      const group = document.getElementById('reset_group').value;
      const pass = document.getElementById('reset_pass').value;
      const pass2 = document.getElementById('reset_pass2').value;

      if (!name || !handle || !group || !pass) return showErr('Please fill in all fields.');
      if (pass !== pass2) return showErr('Passwords do not match.');
      if (pass.length < 6) return showErr('Password must be at least 6 characters.');

      fetch('api/reset_password.php', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name, handle: '@'+handle, group, newPassword: pass})
      }).then(r=>r.json()).then(d=>{
        if(d.success) {
          showOk('Password reset successful! Redirecting to login...');
          setTimeout(() => window.location.href='index.html', 2000);
        } else showErr(d.message);
      }).catch(()=>showErr('Network error. Please try again.'));
    }

    function showErr(msg) { document.getElementById('errBanner').textContent = msg; document.getElementById('errBanner').style.display = 'block'; document.getElementById('okBanner').style.display = 'none'; }
    function showOk(msg) { document.getElementById('okBanner').textContent = msg; document.getElementById('okBanner').style.display = 'block'; document.getElementById('errBanner').style.display = 'none'; }
  </script>
</body>
</html>
